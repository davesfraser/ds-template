version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      uv-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
