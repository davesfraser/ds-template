_templates_suffix: .jinja
_subdirectory: template

project_name:
  type: str
  help: What is the title of your project? (Human readable)
  default: Data science project
  validator: >-
    {% if not (project_name | regex_search('^[A-Za-z0-9][A-Za-z0-9 _-]*$')) %}
    project_name should use letters, numbers, spaces, hyphens, or underscores only
    {% endif %}

project_slug:
  type: str
  help: Repository name used for the project distribution name
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9-]+$')) %}
    project_slug must be lowercase kebab-case — letters, numbers, and hyphens only (e.g. my-ds-project)
    {% endif %}

package_name:
  type: str
  help: Python import package name
  default: "{{ project_slug | replace('-', '_') }}"
  validator: >-
    {% if not (package_name | regex_search('^[a-z][a-z0-9_]+$')) %}
    package_name must be snake_case — letters, numbers, and underscores only (e.g. my_ds_project)
    {% endif %}

project_description:
  type: str
  help: Provide a one line description for pyproject and README
  default: Modern Python data science project

author_name:
  type: str
  help: What is the name of the main author or team name?
  default: Your Name

author_email:
  type: str
  help: Contact email address for pyproject.toml metadata
  default: you@example.com
  validator: >-
    {% if not (author_email | regex_search('^[^@]+@[^@]+\.[^@]+$')) %}
    author_email must be a valid email address (e.g. you@example.com)
    {% endif %}

python_min_version:
  type: str
  help: >-
    Minimum Python version for your project
    3.13 is the recommended default — it's the current stable release and
    has full wheel support across the scientific stack
    3.14 is available but some packages may not yet have pre-built wheels,
    so `uv sync` could fall back to building from source or fail entirely
  default: "3.13"
  choices:
    - "3.12"
    - "3.13"
    - "3.14"
  validator: >-
    {% if not (python_min_version | regex_search('^3\\.\\d+$')) %}
    python_min_version must look like 3.12, 3.13, or 3.14
    {% endif %}

_exclude:
  - "uv.lock"
  - ".github/workflows/template-smoke.yaml"
  - ".venv"
  - ".pytest_cache"
  - ".ruff_cache"
  - "AGENTS.md"
  - "CLAUDE.md"
  - "AGENT.md"

_message_after_copy: |
  Next steps

    cd <your-project-directory>
    uv sync
    uv run pre-commit install
    git add .
    git add uv.lock
    git commit -m "Initial project from template"

_tasks:
  # Copy the single agent instructions source to all filenames that
  # different AI coding assistants expect at the project root
  # To add support for a new assistant, add its target path to this list
  - command: >-
      python -c "import shutil; from pathlib import Path;
      [(__import__('pathlib').Path(t).parent.mkdir(parents=True, exist_ok=True),
      shutil.copy('.ai/agent-instructions.md', t))
      for t in ['AGENTS.md', 'CLAUDE.md', 'AGENT.md', '.github/copilot-instructions.md']]"
