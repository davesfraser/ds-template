name: Template smoke test

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Run all versions even if one fails so you see the full picture
      fail-fast: false
      matrix:
        # Mirror the python_min_version choices in copier.yaml exactly
        # If you add or remove a version from copier.yaml, update this too
        python-version: ["3.12", "3.13"]
        # 3.14 is excluded from CI until the scientific stack has
        # reliable wheel coverage — see the copier.yaml help text
        # Add it here when uv sync --all-groups passes cleanly on 3.14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Render sample project from template
        # Pass the matrix Python version as the copier answer so the
        # rendered project's pyproject.toml reflects what we're testing
        run: |
          uvx --from copier copier copy . rendered --defaults \
            --data python_min_version=${{ matrix.python-version }}

      - name: Create the rendered project's lockfile and install every group
        working-directory: rendered
        run: uv sync --all-groups

      - name: Check that the lockfile was created
        working-directory: rendered
        run: test -f uv.lock

      - name: Re-sync from the lockfile
        working-directory: rendered
        run: uv sync --frozen --all-groups

      - name: Check formatting
        working-directory: rendered
        run: uv run ruff format --check .

      - name: Lint
        working-directory: rendered
        run: uv run ruff check src tests notebooks

      - name: Check marimo notebooks
        working-directory: rendered
        run: uv run marimo check notebooks/marimo

      - name: Type check
        working-directory: rendered
        run: uv run mypy src tests

      - name: Run tests
        working-directory: rendered
        run: uv run pytest -q

      - name: Build package
        working-directory: rendered
        run: uv build
